        summary: "Departamento de desarrollo encargado de la digitalización del grupo empresarial, creando soluciones tecnológicas a medida para las áreas de logística y mantenimiento automotriz."
        highlights:
          - Desarrollé aplicaciones móviles nativas y multiplataforma (Kotlin, Swift, Flutter) para digitalizar la operación logística y el mantenimiento del parque vehicular, implementando geolocalización, webhooks, manejo de JSON y flujos de evidencia fotográfica.
          - Brindé soporte en la integración de flujos de trabajo móviles, interactuando con entornos de desarrollo como Xcode para ajustes funcionales en iOS y Android Studio.
          - Desarrollé módulos del ERP (React, Node.js, Express), implementando WebSockets para la trazabilidad logística en tiempo real dentro de los centros de distribución y APIs RESTful para la integración de servicios móviles.
          - Construí un microservicio independiente en Python (FastAPI) integrando modelos de IA (DeepSeek-V3) y la librería pdfplumber para procesar estados de cuenta, generando estructuras JSON automatizadas.
