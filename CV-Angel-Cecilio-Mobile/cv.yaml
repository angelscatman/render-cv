          - Refactoricé funciones críticas hacia servicios independientes, reduciendo el acoplamiento del sistema principal y mejorando su mantenibilidad a largo plazo.
          - Estandaricé los entornos de desarrollo mediante contenedores Docker y control de versiones con Git, asegurando consistencia en la ejecución para el equipo técnico.
      
