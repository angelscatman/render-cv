    Perfil Profesional:
      - Ingeniero de Software orientado al desarrollo móvil, con experiencia en aplicaciones nativas Android y soluciones multiplataforma para entornos de producción, enfocado en resolver problemas operativos reales. He participado en la construcción de aplicaciones con Kotlin y Flutter, integrando consumo de APIs REST, geolocalización, notificaciones y flujos de evidencia fotográfica. Cuento además con base en el ecosistema web y backend (TypeScript, React, Node.js) para dar soporte a soluciones completas cuando el proyecto lo requiere. Busco integrarme a equipos tecnológicos, con disponibilidad para esquemas remotos o reubicación, donde pueda aportar soluciones móviles estables, mantenibles y alineadas con la operación real.
    
